name: Build server image (ARM64)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-server.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cdisc-kg-server

jobs:
  build-push:
    runs-on: ubuntu-24.04-arm   # native ARM64 runner — no QEMU needed
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify checkout
        run: |
          echo "=== HEAD ==="
          git log --oneline -1
          echo "=== index.js first 3 lines ==="
          head -3 server/index.js
          echo "=== index.js line 2823 ==="
          sed -n '2820,2825p' server/index.js

      - name: Build and push ARM64
        run: |
          cd server
          docker build --no-cache -t ghcr.io/${{ env.IMAGE_NAME }}:latest -t ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}


      - name: Make package public
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/cdisc-kg-server \
            -f visibility=public || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
