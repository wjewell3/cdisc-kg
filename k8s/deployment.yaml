---
# PersistentVolumeClaim — stores the SQLite snapshot on OCI block storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aact-data
  namespace: cdisc-kg
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi          # ~600 MB compressed; 2 Gi gives headroom for .tmp swap
  storageClassName: oci-bv  # OCI block volume (default on OKE)

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trials-api
  namespace: cdisc-kg
  labels:
    app: trials-api
spec:
  replicas: 1               # Only 1 replica — SQLite PVC is ReadWriteOnce
  selector:
    matchLabels:
      app: trials-api
  template:
    metadata:
      labels:
        app: trials-api
    spec:
      # ARM64 node pool
      nodeSelector:
        kubernetes.io/arch: arm64
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api
          image: ghcr.io/wjewell3/cdisc-kg-server:latest   # built by .github/workflows/build-server.yml
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_PATH
              value: /data/aact.db
            - name: STALE_HOURS
              value: "720"
            - name: CORS_ORIGIN
              value: "https://trials-intel.vercel.app"
            - name: AACT_USER
              valueFrom:
                secretKeyRef:
                  name: aact-credentials
                  key: AACT_USER
            - name: AACT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aact-credentials
                  key: AACT_PASSWORD
            - name: GITHUB_COPILOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aact-credentials
                  key: GITHUB_COPILOT_TOKEN
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASS
              value: "trials-kg-2026"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aact-data

---
# Service — ClusterIP, exposed externally via the shared ingress-nginx controller.
# NOTE: No dedicated OCI LoadBalancer. The cluster already runs one free flexible
# 10 Mbps LB in front of ingress-nginx (129.159.83.167); cdisc-kg-ingress routes
# http://<ingress-ip>/cdisc/* -> this service. A second LoadBalancer Service would
# provision a second (billed) OCI LB, so it was removed. See k8s/ingress.yaml.
apiVersion: v1
kind: Service
metadata:
  name: trials-api
  namespace: cdisc-kg
spec:
  selector:
    app: trials-api
  ports:
    - port: 80
      targetPort: 3001
  type: ClusterIP
