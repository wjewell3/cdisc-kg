# NOTE: Neo4j data lives on a hostPath (the node's local disk), NOT a block-volume
# PVC. OCI block volumes have a 50 GB minimum and the graph is only ~3 GB, so a
# second 50 GB volume isn't worth it. hostPath survives pod restarts/redeploys on
# this SINGLE-NODE cluster (the pod always lands on the same node), unlike emptyDir.
# Caveat: only safe while single-node; data is lost only if the node is reimaged —
# then re-run k8s/graph-loader-job.yaml. The graph is always rebuildable from
# /data/aact.db via that Job.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: cdisc-kg
  labels:
    app: neo4j
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: neo4j
          image: docker.io/library/neo4j:5-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: auth
            - name: NEO4J_server_memory_heap_initial__size
              value: "2G"
            - name: NEO4J_server_memory_heap_max__size
              value: "5G"
            - name: NEO4J_server_memory_pagecache_size
              value: "2G"
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
            - name: NEO4J_dbms_memory_transaction_total_max
              value: "0"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"        # low reservation — node CPU is tight (~90%+
              memory: "4Gi"      # requested by other namespaces); bursts to limit
            limits:
              cpu: "2"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          hostPath:
            path: /var/lib/neo4j-data
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: cdisc-kg
spec:
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  type: ClusterIP
