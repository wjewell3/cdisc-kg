# AACT credentials — base64-encode your values:
#   echo -n "youruser" | base64
#   echo -n "yourpass" | base64
# Then apply:  kubectl apply -f secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: aact-credentials
  namespace: cdisc-kg
type: Opaque
data:
  AACT_USER: REPLACE_WITH_BASE64_USER
  AACT_PASSWORD: REPLACE_WITH_BASE64_PASSWORD
