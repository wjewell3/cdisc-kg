---
# CronJob — builds the SQLite snapshot from AACT by running snapshot.js in a Job
# pod that mounts the data PVC. The API pod picks up the new file within 10 min
# (hotswap polling).
#
# suspend: true — the nightly refresh is OFF by design. The snapshot is built
# once (on demand) and kept; AACT data is static enough for this project and a
# nightly run isn't worth the resource cost on this single small node. Trigger a
# manual rebuild any time with:
#   kubectl create job --from=cronjob/aact-snapshot aact-snapshot-manual -n cdisc-kg
apiVersion: batch/v1
kind: CronJob
metadata:
  name: aact-snapshot
  namespace: cdisc-kg
spec:
  suspend: true
  schedule: "0 2 * * *"          # retained for manual --from triggers; not scheduled
  timeZone: "UTC"
  concurrencyPolicy: Forbid       # don't double-run
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 18000  # 5 hours max — operational tables add ~3M rows
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: arm64
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: snapshot
              image: ghcr.io/wjewell3/cdisc-kg-server:latest   # built by .github/workflows/build-server.yml
              command: ["node", "snapshot.js"]
              env:
                - name: DB_PATH
                  value: /data/aact.db
                - name: AACT_USER
                  valueFrom:
                    secretKeyRef:
                      name: aact-credentials
                      key: AACT_USER
                - name: AACT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: aact-credentials
                      key: AACT_PASSWORD
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: "150m"        # small reservation — node CPU is tight; bursts to limit
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: aact-data
