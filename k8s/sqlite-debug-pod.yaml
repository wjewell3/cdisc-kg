apiVersion: v1
kind: Pod
metadata:
  name: sqlite-debug
  namespace: cdisc-kg
spec:
  nodeName: 10.0.10.201
  restartPolicy: Never
  containers:
    - name: sqlite
      image: alpine:3.19
      command: ["sh", "-c", "apk add --no-cache sqlite && sleep infinity"]
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: aact-data
        readOnly: true
